<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading - Escbase</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f7931a;
            --secondary-color: #e67e22;
            --background-color: #0a0a0a;
            --card-background: #141414;
            --text-color: #e0e0e0;
            --muted-text: #888;
            --border-color: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.4rem;
        }

        .nav-logo img {
            height: 36px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--muted-text);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary-color);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-color);
            transition: width 0.3s;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        /* Hero */
        .hero {
            padding: 8rem 1.5rem 4rem;
            text-align: center;
            background: 
                radial-gradient(ellipse at top, rgba(247, 147, 26, 0.15) 0%, transparent 50%),
                var(--background-color);
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .hero h1 span {
            background: linear-gradient(135deg, var(--primary-color) 0%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--muted-text);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-header h2 i {
            color: var(--primary-color);
        }

        .post-count {
            color: var(--muted-text);
            font-size: 0.9rem;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 0.6rem 1.2rem;
            background: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--muted-text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-tab:hover,
        .category-tab.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #000;
        }

        /* Articles Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .article-card {
            background: var(--card-background);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .article-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(247, 147, 26, 0.1);
        }

        .article-card.hidden {
            display: none;
        }

        .article-icon {
            width: 50px;
            height: 50px;
            background: rgba(247, 147, 26, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .article-category {
            display: inline-block;
            background: rgba(247, 147, 26, 0.1);
            color: var(--primary-color);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .article-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .article-card:hover h3 {
            color: var(--primary-color);
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--muted-text);
            margin-top: 1rem;
        }

        /* Footer */
        footer {
            background: #050505;
            border-top: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            text-align: center;
            color: var(--muted-text);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }

            .category-tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                flex-wrap: nowrap;
                padding-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <img src="../esclogo.png" alt="Escbase">
                Escbase
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Trang chủ</a></li>
                <li><a href="../crypto-reports/index.html">Crypto Reports</a></li>
                <li><a href="../blog/index.html">Blog</a></li>
                <li><a href="index.html" class="active">Reading</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>Reading <span>Now</span></h1>
        <p>Bài viết về trading, đầu tư, công nghệ và nhiều chủ đề thú vị khác.</p>
    </section>

    <!-- Content -->
    <div class="container">
        <!-- Category Tabs -->
        <div class="category-tabs">
            <div class="category-tab active" data-category="all">Tất cả</div>
            <div class="category-tab" data-category="trading">Trading</div>
            <div class="category-tab" data-category="strategy">Chiến lược</div>
            <div class="category-tab" data-category="tech">Công nghệ</div>
            <div class="category-tab" data-category="other">Khác</div>
        </div>

        <div class="section-header">
            <h2><i class="fas fa-book-open"></i> Danh Sách Bài Viết</h2>
            <span class="post-count" id="postCount">Đang tải...</span>
        </div>

        <div class="articles-grid" id="articlesGrid">
            <!-- Articles will be loaded here -->
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Escbase. Reading Collection.</p>
    </footer>

    <script>
        // Articles data
        const articles = [
            { file: 'footprint.html', title: 'Giải mã Biểu đồ Footprint', category: 'trading', icon: 'fa-chart-bar' },
            { file: 'foot_print_chart2.html', title: 'Footprint Chart - Nâng cao', category: 'trading', icon: 'fa-chart-area' },
            { file: 'order_flow.html', title: '5 Mẫu hình Order Flow quan trọng', category: 'trading', icon: 'fa-stream' },
            { file: 'future_grid.html', title: 'Hướng Dẫn Sử Dụng Binance Futures Grid', category: 'strategy', icon: 'fa-robot' },
            { file: 'futu_grid.html', title: 'Công cụ mô phỏng Future Grid', category: 'strategy', icon: 'fa-calculator' },
            { file: 'barbell.html', title: 'Chiến lược Đầu tư Crypto: Balanced Barbell', category: 'strategy', icon: 'fa-balance-scale' },
            { file: 'barbell_strategy.html', title: 'Chiến lược Tạ đòn: Infographic', category: 'strategy', icon: 'fa-dumbbell' },
            { file: 'vinfast.html', title: 'Toàn Cảnh Xe Điện VinFast', category: 'tech', icon: 'fa-car' },
            { file: 'an_toan_xe_dien.html', title: 'An Toàn Xe Điện', category: 'tech', icon: 'fa-shield-alt' },
            { file: 'so_sanh_xe.html', title: 'Cuộc Đua Công Nghệ Ô Tô Tại Việt Nam', category: 'tech', icon: 'fa-tachometer-alt' },
            { file: 'med_house.html', title: 'Tủ Thuốc Gia Đình Thông Minh', category: 'other', icon: 'fa-medkit' },
            { file: 'oppenheimer.html', title: 'Khoa học trong phim Oppenheimer', category: 'other', icon: 'fa-film' },
            { file: 'freelancer.html', title: 'Lộ Trình Kiếm Tiền Cho Freelancer', category: 'other', icon: 'fa-laptop-code' }
        ];

        const categoryNames = {
            'trading': 'Trading',
            'strategy': 'Chiến lược',
            'tech': 'Công nghệ',
            'other': 'Khác'
        };

        // Render articles
        function renderArticles(category = 'all') {
            const grid = document.getElementById('articlesGrid');
            const count = document.getElementById('postCount');

            const filtered = category === 'all' 
                ? articles 
                : articles.filter(a => a.category === category);

            count.textContent = `${filtered.length} bài viết`;

            grid.innerHTML = filtered.map(article => `
                <a href="${article.file}" class="article-card">
                    <div class="article-icon">
                        <i class="fas ${article.icon}"></i>
                    </div>
                    <span class="article-category">${categoryNames[article.category]}</span>
                    <h3>${article.title}</h3>
                    <div class="article-meta">
                        <span><i class="fas fa-clock"></i> 10 phút đọc</span>
                        <span><i class="fas fa-arrow-right"></i> Đọc ngay</span>
                    </div>
                </a>
            `).join('');
        }

        // Tab switching
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderArticles(tab.dataset.category);
            });
        });

        // Initial render
        renderArticles();
    </script>
</body>
</html>
