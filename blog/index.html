<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Escbase</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #161616;
            --bg-hover: #1c1c1c;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #f7931a;
            --accent-hover: #ffaa33;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            padding: 3rem 0 2rem;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
        }

        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Navigation */
        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* Section */
        .section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Search */
        .search-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            margin-bottom: 1.5rem;
        }

        .search-box i {
            color: var(--text-muted);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.2s ease;
        }

        .card:hover {
            background: var(--bg-hover);
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .card-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Category tag */
        .category-tag {
            display: inline-block;
            background: rgba(247, 147, 26, 0.1);
            color: var(--accent);
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        /* Count badge */
        .count-badge {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Footer */
        footer {
            padding: 3rem 0 4rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-left {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <a href="../index.html" class="header-content" style="text-decoration: none; color: inherit;">
                <img src="../esclogo.png" alt="Escbase" class="logo">
                <div class="header-text">
                    <h1>Escbase</h1>
                    <p>Crypto Analysis Blog</p>
                </div>
            </a>
        </header>

        <!-- Navigation -->
        <div class="nav-section">
            <div class="nav-links">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="../crypto-reports/index.html" class="nav-link">Reports</a>
                <a href="index.html" class="nav-link active">Blog</a>
                <a href="../read/index.html" class="nav-link">Reading</a>
            </div>
        </div>

        <!-- Search -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search articles...">
        </div>

        <!-- Articles -->
        <div class="section">
            <div class="section-title">
                <i class="fas fa-newspaper"></i>
                Articles <span class="count-badge" id="articleCount">29 articles</span>
            </div>
            <div class="bento-grid" id="blogGrid">
                <!-- Articles will be loaded by JS -->
            </div>
            <div class="no-results hidden" id="noResults">
                <i class="fas fa-search"></i>
                <h3>No results found</h3>
                <p>Try searching with different keywords</p>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <div class="footer-content">
                <div class="footer-left">
                    © 2026 Escbase
                </div>
                <div class="footer-links">
                    <a href="https://www.youtube.com/@ESCBase" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a href="https://discord.gg/SMhy8RjDCf" target="_blank"><i class="fab fa-discord"></i></a>
                    <a href="https://www.facebook.com/escbasexyz" target="_blank"><i class="fab fa-facebook"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const blogPosts = [
            { file: 'crypto_daily_2026_03_05.html', title: 'BTC Phá $72K — Rally Mạnh Khi Lo Ngại Chiến Tranh Giảm', category: 'Market Analysis', desc: 'Bitcoin phá vỡ mốc $72,000 khi thị trường hồi phục mạnh mẽ sau khi lo ngại chiến tranh giảm bớt. Dòng tiền tổ chức tiếp tục đổ vào.' },
            { file: 'vitalik_sanctuary_tech.html', title: 'Vitalik Buterin - Sanctuary Technologies', category: 'Ethereum', desc: 'Vitalik Buterin giới thiệu Sanctuary Technologies — dự án kết hợp AI và blockchain cho không gian kỹ thuật số an toàn.' },
            { file: 'enso_finance.html', title: 'Enso Finance Overview', category: 'DeFi', desc: 'Deep dive into Enso Finance protocol and its growth potential in DeFi space.' },
            { file: 'helios_network.html', title: 'Helios Network', category: 'Layer 1', desc: 'High-performance blockchain for DeFi and Web3 applications.' },
            { file: 'smart_account.html', title: 'Smart Account Revolution', category: 'Account Abstraction', desc: 'Account Abstraction and the future of smart crypto wallets.' },
            { file: 'data_availability.html', title: 'Data Availability in Web3', category: 'Infrastructure', desc: 'Why Data Availability matters for modular blockchain architecture.' },
            { file: 'eth_pectra.html', title: 'Ethereum Pectra Upgrade', category: 'Ethereum', desc: 'Complete overview of Pectra upgrade and its impact on Ethereum.' },
            { file: 'bnb_hardfork_maxwell.html', title: 'BNB Chain Maxwell Hardfork', category: 'BNB', desc: 'Key changes and improvements in Maxwell hardfork.' },
            { file: 'story_protocol.html', title: 'Story Protocol Deep Dive', category: 'IP', desc: 'Story Protocol - Breakthrough on-chain IP platform.' },
            { file: 'sonic.html', title: 'Sonic Project Analysis', category: 'Layer 1', desc: 'Sonic - High-speed blockchain with EVM compatibility.' },
            { file: 'boundless.html', title: 'Boundless Project Analysis', category: 'ZK', desc: 'Boundless - ZK solution for blockchain scaling.' },
            { file: 'pharos_network.html', title: 'Pharos Network Analysis', category: 'Layer 1', desc: 'Pharos Network - High-performance DeFi blockchain.' },
            { file: 'sei_ai_agent.html', title: 'Sei AI Agent Economy', category: 'AI', desc: 'Sei and the vision for Agent AI economy.' },
            { file: 'trailblazer.html', title: 'Taiko Trailblazers Update', category: 'Layer 2', desc: 'Latest information on Taiko Trailblazers program.' },
            { file: 'hypernative.html', title: 'Hypernative Security', category: 'Security', desc: 'Proactive security solution for Web3 ecosystem.' },
            { file: 'zama.html', title: 'Zama.ai: Privacy Future', category: 'FHE', desc: 'Zama and Fully Homomorphic Encryption technology.' },
            { file: 'aztec_phan_tich.html', title: 'Aztec Network Analysis', category: 'Privacy', desc: 'Aztec - Privacy Layer 2 for Ethereum.' },
            { file: 'quantumroot.html', title: 'QuantumRoot for Bitcoin', category: 'Security', desc: 'Protecting Bitcoin from quantum computing threats.' },
            { file: 'canton_network.html', title: 'Canton Network Analysis', category: 'Finance', desc: 'Canton - Smart financial network.' },
            { file: 'citrea.html', title: 'Citrea Project Overview', category: 'Bitcoin', desc: 'Citrea - ZK Rollup on Bitcoin.' },
            { file: 'anoma.html', title: 'Anoma Project Overview', category: 'Privacy', desc: 'Anoma - Private peer-to-peer payment protocol.' },
            { file: 'risechain.html', title: 'Risechain Overview', category: 'Layer 2', desc: 'Risechain - Optimistic rollup Layer 2.' },
            { file: 'vitalik2025.html', title: 'Vitalik Ethereum 2025', category: 'Ethereum', desc: 'Summary of Vitalik\'s vision for Ethereum 2025.' },
            { file: 'bitcoin.html', title: 'Bitcoin Deep Analysis', category: 'Bitcoin', desc: 'Comprehensive analysis of Bitcoin and growth potential.' },
            { file: 'ethereum.html', title: 'Ethereum Deep Analysis', category: 'Ethereum', desc: 'Ethereum overview, roadmap and future outlook.' },
            { file: 'solana.html', title: 'Solana Ecosystem', category: 'Layer 1', desc: 'Analysis of Solana and DeFi/NFT ecosystem.' },
            { file: 'chainlink.html', title: 'Chainlink Oracle Platform', category: 'Infrastructure', desc: 'Chainlink overview and CCIP technology.' },
            { file: 'celestia.html', title: 'Celestia DA Layer', category: 'Modular', desc: 'Celestia and the modular blockchain trend.' },
            { file: 'hyperliquid.html', title: 'Hyperliquid Perp DEX', category: 'DeFi', desc: 'Analysis of Hyperliquid and its potential.' }
        ];

        function renderPosts(posts) {
            const grid = document.getElementById('blogGrid');
            const count = document.getElementById('articleCount');
            const noResults = document.getElementById('noResults');

            if (posts.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                count.textContent = '0 articles';
                return;
            }

            noResults.classList.add('hidden');
            count.textContent = `${posts.length} articles`;

            grid.innerHTML = posts.map(post => `
                <a href="${post.file}" class="card-link">
                    <div class="card">
                        <span class="category-tag">${post.category}</span>
                        <div class="card-title">${post.title}</div>
                        <div class="card-desc">${post.desc}</div>
                        <div class="card-meta">
                            <span><i class="fas fa-clock"></i> 5 min read</span>
                            <span><i class="fas fa-arrow-right"></i> Read</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = blogPosts.filter(post => 
                post.title.toLowerCase().includes(query) ||
                post.category.toLowerCase().includes(query) ||
                post.desc.toLowerCase().includes(query)
            );
            renderPosts(filtered);
        });

        // Initial render
        renderPosts(blogPosts);
    </script>
</body>
</html>
